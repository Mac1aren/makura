<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffeef6">
  <meta name="robots" content="noindex, nofollow">
  <title>♡ makura's secret corner ♡</title>
  <meta name="description" content="you found my secret place (˶ᵔ ᵕ ᵔ˶)">

  <!-- Preload the avatar so the card never pops in empty -->
  <link rel="preload" as="image" href="avatar.jpg">

  <!-- One lightweight cute font, single weight range -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ✦ animated dreamy background layers ✦ -->
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--pink" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--lilac" aria-hidden="true"></div>
  <div id="floaties" class="floaties" aria-hidden="true"></div>

  <!-- ♡ the one and only card ♡ -->
  <main class="scene">
    <section class="card" id="card">

      <!-- avatar + kawaii orbit decor -->
      <div class="avatar-zone">
        <span class="orbit orbit--1" aria-hidden="true">✦</span>
        <span class="orbit orbit--2" aria-hidden="true">♡</span>
        <span class="orbit orbit--3" aria-hidden="true">✧</span>
        <span class="orbit orbit--4" aria-hidden="true">･ﾟ</span>

        <div class="avatar-ring">
          <div class="avatar-frame">
            <img src="avatar.jpg" alt="makura" class="avatar" draggable="false">
          </div>
        </div>

        <span class="avatar-badge" aria-hidden="true">૮ ˶ᵔ ᵕ ᵔ˶ ა</span>
      </div>

      <!-- name / title -->
      <h1 class="title">
        <span class="title-deco" aria-hidden="true">✧˖°</span>
        you found me
        <span class="title-deco" aria-hidden="true">°˖✧</span>
      </h1>

      <!-- curiosity hook -->
      <p class="subtitle">
        my private side lives here&hellip;<br>
        <span class="subtitle-soft">don't keep me waiting (｡>﹏&lt;｡)</span>
      </p>

      <!-- ♡ THE button ♡ -->
      <a
        class="cta"
        id="cta"
        href="https://fansly.com/makuraaaah/t5?r=meoww"
        rel="noopener"
      >
        <span class="cta-shine" aria-hidden="true"></span>
        <span class="cta-text">♡&nbsp; let me in &nbsp;♡</span>
      </a>

      <p class="cta-whisper" aria-hidden="true">( づ ˶˘ ³˘)づ&nbsp; it's warmer inside</p>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
